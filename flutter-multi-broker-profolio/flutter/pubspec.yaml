name: multi_broker_portfolio
description: "Multi-Broker Portfolio Tracker — Flutter client."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Internationalization
  intl: any

  # Local storage
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

  # Firebase (declared for downstream modules; not initialized here)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  firebase_crashlytics: ^4.0.4

  # Remote clients
  http: ^1.2.0
  web_socket_channel: ^3.0.0

  # Crypto (Argon2id + AES-GCM, pure Dart cross-platform incl. web)
  cryptography: ^2.7.0

  # Logging
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ">=2.4.0 <2.5.0"
  firebase_auth_mocks: ^0.14.2

flutter:
  uses-material-design: true
  generate: true
