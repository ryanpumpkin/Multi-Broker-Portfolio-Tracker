name: multi_broker_portfolio
description: "Multi-Broker Portfolio Tracker — Flutter client."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Internationalization
  intl: any

  # Local storage (declared for downstream modules; not used here)
  drift: ^2.18.0
  flutter_secure_storage: ^9.2.2

  # Firebase (declared for downstream modules; not initialized here)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  firebase_crashlytics: ^4.0.4

  # Logging
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
