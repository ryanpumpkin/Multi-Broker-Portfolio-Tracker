# ─────────────────────────────────────────────────────────────────────────────
# Multi-Broker Portfolio Tracker — production Compose stack
#
# Services:
#   backend      – FastAPI proxy service (built from backend/Dockerfile)
#   ibkr-gateway – IB Gateway sidecar (Client Portal API over HTTPS)
#   futu-opend   – Futu OpenD sidecar (OpenAPI over TCP)
#
# All services share the mbp-net bridge network.  Gateway ports are exposed
# only to backend — they are NOT published to the host in this file.
#
# See infra/README.md for credentials, first-run instructions, and the smoke
# test.  Copy .env.example → .env and fill in your values before running.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  mbp-net:
    driver: bridge

volumes:
  ibkr-state:
    driver: local
  futu-state:
    driver: local

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  # backend shares futu-opend's network namespace so OpenD can listen on
  # 127.0.0.1 (no encryption required for "local" trade calls). The
  # backend reaches OpenD via localhost:11111. Side effect: backend has
  # no networks/ports of its own — all port publishing for the API
  # (8000) is done on the futu-opend service below.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    image: mbp-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MBP_IB_GATEWAY_HOST: ibkr-gateway
      MBP_IB_GATEWAY_PORT: "5000"
      MBP_FUTU_OPEND_HOST: 127.0.0.1
      MBP_FUTU_OPEND_PORT: "11111"
    volumes:
      - ./infra/futu-opend/conn_key.pem:/secrets/futu_conn_key.pem:ro
    # network_mode: service:X is not resolved by older docker-compose
    # (e.g. Synology v2.9). Use the explicit container name instead.
    # The container_name on futu-opend below pins this to a stable
    # value across recreations.
    network_mode: "container:mbp-futu-opend"
    depends_on:
      futu-opend:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/healthz',timeout=4); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── IB Gateway sidecar ──────────────────────────────────────────────────────
  # Image: ghcr.io/unusualwhale/ibkr-cpapi (open-source IB Client Portal
  # Gateway wrapper).  Credentials are passed via environment variables;
  # session state is persisted in the ibkr-state volume.
  #
  # IMPORTANT: You must supply IBKR_USERNAME, IBKR_PASSWORD, and
  # IBKR_TRADING_MODE (paper|live) in your .env file.  See infra/README.md.
  ibkr-gateway:
    image: ghcr.io/unusualwhale/ibkr-cpapi:latest
    restart: unless-stopped
    environment:
      IBKR_USERNAME: "${IBKR_USERNAME:-}"
      IBKR_PASSWORD: "${IBKR_PASSWORD:-}"
      IBKR_TRADING_MODE: "${IBKR_TRADING_MODE:-paper}"
    # Port 5000 is the Client Portal REST gateway — exposed only on mbp-net.
    expose:
      - "5000"
    volumes:
      - ibkr-state:/root/ibkr
    networks:
      - mbp-net

  # ── Futu OpenD sidecar ──────────────────────────────────────────────────────
  # Custom image — built locally from Futu's official Linux OpenD binary.
  # Before the first build you must download OpenD.tar.gz and place it at
  # `infra/futu-opend/OpenD.tar.gz`. See `infra/futu-opend/README.md`.
  #
  # IMPORTANT: You must supply FUTU_OPEND_LOGIN_ACCOUNT and
  # FUTU_OPEND_LOGIN_PASSWORD_MD5 in your .env file.
  futu-opend:
    build:
      context: ./infra/futu-opend
      dockerfile: Dockerfile
    image: mbp-futu-opend:latest
    # Pinned name so the backend's network_mode: container:mbp-futu-opend
    # resolves the same way across compose versions.
    container_name: mbp-futu-opend
    # The FutuOpenD binary is x86_64-only. Force amd64 so the container
    # runs under Rosetta on Apple-silicon Macs; on a native x86_64 host
    # this is a no-op.
    platform: linux/amd64
    restart: unless-stopped
    environment:
      FUTU_OPEND_LOGIN_ACCOUNT: "${FUTU_OPEND_LOGIN_ACCOUNT:-}"
      FUTU_OPEND_LOGIN_PASSWORD_MD5: "${FUTU_OPEND_LOGIN_PASSWORD_MD5:-}"
      # Bind to 127.0.0.1 so Futu treats backend calls (which now share
      # this network namespace) as local — no encryption required.
      FUTU_OPEND_LISTEN_IP: "127.0.0.1"
    # 11111 — API port (used by the backend on the shared net).
    # 22222 — Telnet console for entering the SMS verify code on first
    #         login.
    # 8000  — published on behalf of the backend, which shares this
    #         namespace via `network_mode: service:futu-opend`.
    ports:
      - "8000:8000"
      - "127.0.0.1:22222:22222"
    volumes:
      - futu-state:/opt/OpenD/data
    networks:
      - mbp-net
